name: CI

on: [push, pull_request]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # hfst publishes wheels for cp310–cp312 only, so 3.12 is the ceiling.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          wget https://apertium.projectjj.com/apt/install-nightly.sh -O - | sudo bash
          sudo apt-get -f install cg3 hfst python3-hfst

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          # The apertium install script installs the tools to /usr/local, then
          # exits non-zero on a fresh machine (set -e + a grep for an existing
          # PYTHONPATH that finds nothing). Tolerate that spurious exit...
          wget https://apertium.projectjj.com/osx/install-nightly.sh -O - | sudo bash || true
          # ...then verify the CLI tools we actually need are present, so a
          # genuine install failure still fails the job.
          for tool in vislcg3 cg-conv hfst-tokenize hfst-lookup; do
            command -v "$tool" || { echo "::error::$tool not installed"; exit 1; }
          done

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install project
        run: uv sync --group dev --extra server

      - name: Lint with Ruff
        run: uv run ruff check .

      # Advisory: the codebase has pre-existing type errors; surfaced but
      # non-blocking until they are addressed.
      - name: Type-check with mypy
        run: uv run mypy src
        continue-on-error: true

      - name: Test with pytest
        run: uv run pytest -vv --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
